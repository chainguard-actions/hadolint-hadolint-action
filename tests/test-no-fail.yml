name: Test no-fail mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          dockerfile: tests/fixtures/Dockerfile.warning
          no-fail: 'true'
          failure-threshold: 'info'
      - name: Assert action did not fail despite violations
        run: |
          echo "PASS: action completed without failing (no-fail=true)"
      - name: Assert results contain violation output
        env:
          RESULTS: ${{ steps.action.outputs.results }}
        run: |
          echo "results: $RESULTS"
          if [ -z "$RESULTS" ]; then
            echo "FAIL: expected lint violations in results but got empty output"
            exit 1
          fi
          echo "PASS: lint violations reported as expected"
